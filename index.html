<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<body>
    <div class ="weather-app">
    <header> 
         <h1> <span class="logo">✨Weather<span class="logo2">Girl</span></span>
        </h1>
         <br />
        <form class ="search-form">
        <input type="search" placeholder="Enter a city.." required class="search-form-input"/>
        <input type="submit" value="search" class="search-button"/>
        </form>
</header>

<main>
    <div class="weather-app-data">
    <div>
    <H1 class="city-name"></H1>
    <p class="weather-app-details">
        <span id="time"></span>, <span id="description"></span>
    <br />
    Humidity: <strong id="humidity"></strong>, Wind: <strong id="wind-speed"></strong>
    </p>
</div>
<div class="weather-app-temp-container">
    <div ><img src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/few-clouds-day.png" 
        class="weather-icon"> 
    </div>
    <div class="weather-temp" id="temperature"></div>
    <div class="weather-app-unit">°C</div>
</div>
</div>
<div id="forecast" class="weather-forecast"></div>
</div>
</main>
 <footer> Coded by <a href="https://github.com/rebeccacorrinne" target="_blank">Rebecca Trainor</a>, open sourced on <a href="https://github.com/rebeccacorrinne/WeatherApp" target="_blank">GitHub</a>, website hosted on <a href="https://app.netlify.com/projects/rebeccacorrinneweatherapp/overview" target="_blank">Netlify</a> </footer>
</div>
<script src="index.js"></script>
</body>
</html>
